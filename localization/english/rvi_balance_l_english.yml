 vamp_ritual_phase_desc: "The Shindig is in full swing"
 REASON_NOT_A_VAMP: "You are not a vampire"
 rvi_activity_vamp_ritual: "Vampire Shindigh"
 rvi_activity_vamp_ritual_selection_tooltip: "Local [Concept('vampire', 'Children of the Night')|E] will gather to discuss pressing matters and share experience.\n\nExpected rewards:\n$BULLET_WITH_TAB$Guaranteed [Concept('vi_vampire_lifestyle', 'Vampire Lifestyle')|E] Experience on completion\n$BULLET_WITH_TAB$Participants can relieve [Concept('stress', 'Stress')|E]"
 activity_invite_rule_house_vampires: "Vampires of your House"
 activity_invite_rule_other_vampires: "Other Vampires"
 rvi_no_5_vamp: "Your house must have at least 5 vampires"
 rvi_activity_vamp_ritual_guest_help_text: "Local [Concept('vampire', 'vampires')|E] will gather to discuss pressing matters and share experience."
 rvi_activity_vamp_ritual_desc: "Local [Concept('vampire', 'vampires')|E] will gather to discuss pressing matters, share experience, and simply enjoy a pleasant night together."
 rvi_activity_vamp_ritual_host_desc: "$BULLET_WITH_TAB$Guaranteed [Concept('vi_vampire_lifestyle', 'Vampire Lifestyle')|E] experience on completion\n$BULLET_WITH_TAB$Guests can gain Lifestyle Traits and Trait Experience if the host has [GetTrait('vi_heartstealer').GetName( ROOT.Char )]#!\n$BULLET_WITH_TAB$Participants can relieve [Concept('stress', 'Stress')|E]"
 rvi_activity_vamp_ritual_destination_selection: "The Shindigh can only be held in the capital"
 rvi_blood_option_food: "Blood Quality"
 rvi_blood_bad: "Local Populace"
 rvi_blood_bad_desc: "#weak Nothing bad will happen if we let the vampires hunt the locals... right?!#!"
 rvi_blood_normal: "Mixed Blood"
 rvi_blood_normal_desc: "#weak Familiar mortal blood supplemented with the taste of various animals#!"
 rvi_blood_good: "Animal Blood"
 rvi_blood_good_desc: "#weak The well-being of the local population directly affects our own. We cannot use them as food#!"
 vamp_intent: "Relax with Guests"
 vamp_intent_desc: "Relax and exchange experience with other Children of the Night"
 rvi_ritual.0001.t: "Lack of Piety"
 rvi_ritual.0001.desc: "Not a single living soul accepted the invitation. [ROOT.Char.GetFaith.WitchGodName] will not bless them!"
 rvi_ritual.0001.a: "They will feel [ROOT.Char.GetFaith.WitchGodHerHis|U] wrath!"
 rvi_ritual.0002.t: "A Gift"
 rvi_ritual.0002.desc: "«[ROOT.Char.Custom('FormOfAddressForLiege')]» — [inviter.GetFirstName] addresses me with a predatory smile, slightly tilting [inviter.GetHerHis] head.\n\n«I could not come empty-handed to such a momentous occasion. So I brought… a small gift.»\n\nThe \"gift\" looks extremely confused. [Select_CString(created_food.IsFemale, 'She', 'He')] shifts [Select_CString(created_food.IsFemale, 'her', 'his')] gaze between the giver and me, clearly trying to understand what is happening.\n\n«Is this some kind of secret society? Or… a charity evening? Am I understanding this correctly?»"
 rvi_ritual.0002.a: "Come here"
 rvi_ritual.0002.b: "My sincere thanks"
 rvi_ritual.0002.c: "[Select_CString(created_food.IsFemale, 'She', 'He')] will make a fine courtier"
 rvi_ritual.0002.d: "Get [Select_CString(created_food.IsFemale, 'her', 'him')] out of here"
 rvi_ritual.0003.t: "Jealousy"
 rvi_ritual.0003.desc: "When you enter the hall, the atmosphere is extremely tense.\n[rvi_rowdy.GetFirstName] stands by the window with a drawn sword, [rvi_rowdy.GetHerHis] face twisted with rage. Opposite [rvi_rowdy.GetHerHim], not backing down an inch, stands [rvi_rowdy_2.GetFirstName], flushed with anger, nearly shouting:\n\n«Once again you push yourself forward like the last upstart?! Just because [host.GetFirstName] occasionally throws you a kind word, you already think you're [host.GetHerHis] right hand?!»\n\n[rvi_rowdy.GetFirstName] growls back, gripping the sword hilt tighter:\n\n«And you're any better? How many times have you licked [host.GetHerHis] boots just to be closer?! At least I bring real value, instead of just scurrying at [host.GetHerHis] feet like a hungry [Select_CString(rvi_rowdy.IsFemale, 'bitch', 'dog')]!»"
 rvi_ritual.0003.a: "Enough. Both of you, quiet!"
 rvi_ritual.0003.b: "Silence!"
 rvi_ritual.0003.c: "[rvi_rowdy_2.GetFirstName], what kind of circus is this?"
 rvi_ritual.0003.d: "Calm down, [rvi_rowdy.GetFirstName]"
 rvi_ritual.0003.e: "What fools..."
 rvi_ritual.0004.t: "Undead Talent"
 rvi_ritual.0004.desc: "During the gathering, after several cups of blood and tense conversations, [rvi_poet.GetFirstName] suddenly falls into a strange state. [Select_CString(rvi_poet.IsFemale, 'She', 'He')] begins to recite poetry — first quietly, almost to [rvi_poet.GetHerselfHimself], then louder and more passionately.\n\nThe hall falls silent as [rvi_poet.GetFirstName] rises from [rvi_poet.GetHerHis] seat. [rvi_poet.GetHerHis] eyes burn with a strange, almost feverish fire:\n\n«We are the dead who still remember the taste of life,\nWe are shadows that yearn for the sun,\nAnd in every sip of another's blood\nWe search for the forgotten taste of our own hearts…»"
 rvi_ritual.0004.a: "Please, continue!"
 rvi_ritual.0004.b: "You have real talent!"
 rvi_ritual.0004.c: "Don't do that again"
 rvi_ritual.0005.t: "The Reveler"
 rvi_ritual.0005.desc: "The feast has long since spiraled out of control.\nWine flows like a river, mixing with blood on the marble floor. Laughter, moans, and the clinking of goblets merge into one mad symphony.\n\nAt some point [rvi_soul.GetFirstName] jumps onto the table, scattering cups and silver dishes. With burning eyes, [rvi_soul.GetSheHe] raises a goblet full of warm blood and delivers a toast that makes everyone fall silent for a moment… before exploding into an approving roar."
 rvi_ritual.0005.a: "Do you have a dream, [rvi_soul.GetFirstName]?"
 rvi_ritual.0005.b: "To you, [rvi_soul.GetFirstName]!"
 rvi_ritual.0005.c: "Get down from the table"
 rvi_ritual.0006.t: "The First Night"
 rvi_ritual.0006.desc: "The sun has just disappeared beyond the horizon when the first guests begin to arrive.\n\nOne after another, black carriages and riders on coal-black horses approach the gates. Pale figures in expensive clothes step out into the night, their eyes gleaming in the torchlight. Some bring sealed vessels of blood, others bring bound \"gifts\", and some simply smile predatorily, sensing the scent of the living nearby.\n\nThe air gradually fills with tension, anticipation, and the faint smell of blood. The Shindigh is just beginning."
 rvi_ritual.0006.a: "Welcome!"
 rvi_ritual.0006.b: "Welcome!"
 rvi_impressed_guests_desc_tt: "All guests are impressed"
 rvi_not_impressed_guests_desc_tt: "The guests are not particularly enthusiastic"
 rvi_ritual.0007.t: "Vigilante Justice"
 rvi_ritual.0007.desc: "The Shindigh is in full swing when you notice that [rvi_berserker.GetFirstName] has suddenly disappeared. Before you can ask anyone about [rvi_berserker.GetHerHim], a worried servant comes running.\n\nYou quickly leave the hall and head toward the forest. Within minutes, you hear furious roars and the sounds of a brutal fight ahead.\n\nIn a large forest clearing you see [rvi_berserker.GetFirstName]. [rvi_berserker.GetSheHe] stands knee-deep in blood, breathing heavily, eyes burning with insane fire. Around [rvi_berserker.GetHerHim] lie over a dozen bodies of the bandits you were told about recently. Some are still weakly twitching.\n\n[rvi_berserker.GetFirstName] turns to you, [rvi_berserker.GetHerHis] face covered in blood and fangs bared in a predatory grin.\n\n«They dared to prowl so close to your lands…» — [rvi_berserker.GetSheHe] growls."
 rvi_ritual.0007.a: "You killed them all by yourself?"
 rvi_ritual.0007.b: "It wasn't your place to judge them!"
 rvi_ritual.0008.t: "Hunter and Prey"
 rvi_ritual.0008.desc: "The noise, laughter, and smell of blood and wine begin to irritate you. You decide to step away into the nearby forest to breathe fresh air and clear your mind.\n\nThe silence of the forest soothes… until the air is sliced by the whistle of a crossbow bolt that slams into your chest. A clay pot follows, shattering against a nearby tree and enveloping you in a cloud of acrid silvery powder.\n\nA burning weakness instantly pierces your body. Your limbs grow heavy, and your movements become sluggish and clumsy.\n\nFrom the bushes emerges [vi_new_hunter.GetFirstName] with a crossbow at the ready. [vi_new_hunter.GetHerHis] eyes widen in surprise.\n\n«What the… you still ain't dead, you goddamn [Select_CString(ROOT.GetCharacter.IsFemale, 'bitch', 'bastard' )]?! Fine… I'll finish you off the old way.»\n\n[Select_CString(vi_new_hunter.IsFemale, 'She', 'He')] discards the crossbow, draws a blade adorned with religious symbols, and assumes a fighting stance."
 rvi_ritual.0008.a: "You little shit..."
 rvi_ritual.0008.a_desc: "This hunter has nothing to oppose"
 rvi_ritual.0008.b: "Do your old way in my prison"
 rvi_ritual.0008.b_desc: "What to do with [vi_new_hunter.GetHerHim] can be decided later"
 rvi_ritual.0008.с: "You want a fair fight? Then have it..."
 rvi_ritual.0008.c_desc: "You and the [Select_CString(vi_new_hunter.IsFemale, 'old huntress', 'old hunter')] engage in a deadly duel"
 rvi_ritual.0008.d: "Fuck off, you decrepit [Select_CString(vi_new_hunter.IsFemale, 'bitch', 'bastard')]!"
 rvi_ritual.0008.d_desc: "You disappear among the trees. Dealing with [vi_new_hunter.GetHerHim] can wait.\nIf [vi_new_hunter.GetSheHe] doesn't get to you first."
 rvi_strange_dust_modifier: "Strange Dust"
 rvi_strange_dust_modifier_desc: "The old hunter has an ace up sleeve"
 
 
 rvi_ritual.1010.t: "The Final Night"
 rvi_ritual.1010.desc: "The Shindigh is drawing to a close. The air in the hall is heavy, thick with the scent of blood, incense, and sweat.\n\nThe guests, tired but content, begin to depart, carrying with them memories of one of the brightest nights of their undead lives. Many approach you personally to express their admiration and promise to «definitely come next time»."
 rvi_ritual.1010.a: "Perform the final occult ritual"
 rvi_ritual.1010.b: "Use intrigue and subtle manipulation"
 rvi_ritual.1010.c: "Deliver a farewell speech"
 rvi_ritual.1010.c.great: "The guests are delighted"
 rvi_ritual.1010.c.poor: "The guests show little interest"
 rvi_ritual.1010.d: "Quietly bid farewell to the guests"
 rvi_activity_vamp_ritual_conclusion_desc: "The «[GetActivityType('rvi_activity_vamp_ritual').GetName]» has concluded"
 
 rvi_ritual.1011.title: "Chaos Outside the Window"
 rvi_ritual.1011.desc: "The last guests have departed for their havens. You retire to your chambers, from where the surroundings are clearly visible through the window.\n\nBelow, as far as the eye can see, dozens of corpses are scattered. Some are torn apart, others carefully drained. Deranged people wander the streets, searching for their loved ones among the dead.\n\nYou allowed them to hunt.\n\nAnd they hunted."
 rvi_ritual.1011.a: "Oh well"
 rvi_ritual.1012.title: "A Strange Sight"
 rvi_ritual.1012.desc: "The last guests have departed. You retire to your chambers and look out the window.\n\nThere is some activity in the streets. Several bodies lie by the walls and in the alleys — not as many as there could have been, but enough to understand that not all guests were satisfied with the imported blood.\n\nCrying and shouts can be heard here and there. People carry away bodies and call for the guards. However, there is no panic — rather weary fear and the usual tension of these lands.\n\nThere was enough blood at the Shindigh to sate the guests' hunger. But it was impossible to completely restrain the vampires from hunting."
 rvi_ritual.1012.a: "It could have been worse"
 rvi_ritual.1013.title: "A Dark Hand"
 rvi_ritual.1013.desc: "The last guests have departed. You retire to your chambers and look out the window.\n\nEverything below is calm. A few vampires among the guests, whose names you don't even know, are diligently cleaning up the aftermath of the night — broken jugs, scraps of expensive fabric, and traces of debauchery.\n\nThanks to the generously purchased blood, none of the guests hunted the locals. And this did not go unnoticed.\n\nBy midday, you receive news: several influential vampires who attended the feast have decided to invest in these lands. Some sent stonemasons, some trade caravans, and some simply transferred gold for the development of the domain.\n\nThey saw that under your rule these lands are reliably protected from other undead. And that means — one can safely invest here."
 rvi_ritual.1013.a: "Amazing"
 rvi_activity_vamp_ritual_host_an_a: "a"