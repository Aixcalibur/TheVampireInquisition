 rvi_hungry_vampire_modifier: "The Hunger"
 rvi_hungry_vampire_modifier_desc: "Without regular sustenance, a bloodsucker can become extremely volatile and dangerous."
 rvi_victim_court_position: "Intimate Favorite"
 rvi_victim_court_position_desc: "Every day, this favorite fills a small vessel with their own blood, often without the slightest inkling of its true purpose."
 rvi_balance.0003.title: "The Hunger"
 rvi_balance.0003.desc: "Today the world looks different: colors have grown unnaturally vivid, and the rhythmic beating of mortal hearts beside me echoes like thunder in my ears.\n\nI feel a surging power; my entire body is so taut that I find it impossible to relax. Every second of self-control is a grueling battle with myself. My inner beast has not merely awakened—it claws beneath my ribs, sinking its talons into my mind and demanding its due."
 rvi_balance.0003.a1: "I will endure"
 rvi_balance.0003.a1_tt: "You will not be able to sate your hunger as long as the position of Intimate Favorite remains vacant"
 rvi_balance.0003.a2: "I must find someone. Immediately."
 rvi_balance.0003.a2_tt: "You will head out into the world to find anyone who might serve your needs."
 rvi_balance.0004.title: "A Meeting in the Deep Woods"
 rvi_balance.0004.desc: "To avoid tempting the beast, I was forced to shun the mortal settlement. After hours of wandering under the scorching sun, I retreated into the deep thicket, where the canopy shields my skin from the burning rays.\n\nYou were already prepared to pounce upon the first animal you could find, when suddenly, a filthy [Select_CString(new_victim.IsFemale, 'wench', 'rogue')] with a rusted sword leaped out from behind a tree.\n\n— Your money or your life, [Select_CString(ROOT.GetCharacter.IsFemale, 'good lady', 'kind sir' )]! - the cry rang out from beneath the forest canopy. \n\nIt might have sounded menacing, had it not been for the sharp note of desperation that crept into [new_victim.GetHerHis] voice the moment your eyes met.\nYou stopped, but instead of tearing [Select_CString(new_victim.IsFemale, 'this insolent wench', 'this insolent rogue' )] limb from limb, an idea struck you. You looked [Select_CString(new_victim.IsFemale, 'her', 'him' )] straight in the eyes frightened, pale, and clearly undernourished for many days.\n\nThe perfect candidate"
 rvi_balance.0004.a1: "I have a... curious proposal for you."
 rvi_balance.0004.a1_tt: "For a handsome reward, [Select_CString(new_victim.IsFemale, 'she', 'he')] will fill a small vessel with [new_victim.GetHerHis] blood each day to sate your hunger, truly believing that [Select_CString(new_victim.IsFemale, 'she', 'he')] is merely aiding a physician's research."
 rvi_balance.0004.a2: "Begone, before I tear your legs off!"
 rvi_balance.0004.a2_tt: "You will not be able to sate your hunger as long as the position of Intimate Favorite remains vacant"
 max_prestige_level_entry: "An unrevealed vampire is forced to remain in the shadows"
