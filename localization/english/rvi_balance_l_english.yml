l_english:

 rvi_balance.0001.title: "Blood Curse"
 rvi_balance.0001.desc: "Immortal blood thickens in my veins, like autumn resin in pine trunks. I struggle to move my arms and rise to my feet before the realization of what happened sets in.\n\nToday's awakening brought nothing but suffering—as if [ROOT.Char.GetFaith.DevilName] themself sank their claws into my essence and tore out everything they could reach.\n\nAn ancient curse demanded payment for eternity..."
 rvi_balance.0001.a1: "I'll have to endure..."
 rvi_balance.0001.a2: "I'll fill the void with hunting"
 rvi_balance.0002.title: "Hourglass"
 rvi_balance.0002.desc: "Another year of my unlife has passed... Yet today I feel nothing but emptiness and weariness.\n\nI sense something leaving me—something not physical—as though I had climbed a great mountain of sand and tumbled down to the very bottom, destined never to reach the summit."
 rvi_balance.0002.a1: "I must regain my composure"
 
 rvi_balance.0002.a1_tt: "You will lose all free non-vampiric skill points each year you exist."
 
 
 
 rvi_legacy_track_name: "Eternity"
 rvi_legacy_track_desc: "Immortal bloodline fed by blood"
 rvi_one_legacy_1_name: "Exalt"
 rvi_dhampire_exalt_effect: "Allows to exalt an dhampire to a full-fledged creature of the night"
 rvi_exalt_interaction: "Exalt dhampire"
 rvi_exalt_description_tt: "The dhampire will become a full-fledged creature of the night"
 rvi_legacies.1001.t: "Exalt"
 rvi_legacies.1001.desc: "A half-dead offspring of cursed blood stands before you. [Select_CString(vi_target.IsFemale, 'Her', 'His')] gut is false, and his half-life serves no purpose. \n\nYou know a ritual that can awaken the thirst and make [Select_CString(vi_target.IsFemale, 'her', 'him')] a true creature of the night."
 rvi_legacies.1001.a: "Come closer, child"
 rvi_one_legacy_2_name: "Obsessed with details"
 rvi_one_legacy_3_name: "Immortal Proud"
 rvi_one_legacy_4_name: "Nights under the crosses"
 rvi_one_legacy_5_name: "And what will you do to us?"
 rvi_vampire_loyality_effect: "Allows to force vampires of your dynasty to be loyal"
 rvi_loyality_interaction: "Force loyalty"
 rvi_loyality_description_tt: "Make this creature of the night serve you faithfully"
 rvi_legacies.1002.t: "Undying Loyalty"
 rvi_legacies.1002.desc: "[vi_loyal.GetFirstName] showed up at the first call. You felt confusion before you heard the footsteps. [Select_CString(vi_loyal.IsFemale, 'She', 'He')] still stands at the threshold, trying to maintain [Select_CString(vi_loyal.IsFemale, 'her', 'his')] dignity, but [Select_CString(vi_loyal.IsFemale, 'her', 'his')] gaze treacherously slides to the table.\n\nThe cup. It sits on the table, heavy, dark, brimming with your blood. Petals and roots float within it, their names known only to you. They don't so much soften the taste as make it unbearably desirable. \n\nIt's not just blood. It's submission, clothed in the form of a gift."
 rvi_legacies.1002.a: "I'm not holding you back, child."
 rvi_trait_interaction: "Absorb Vitality"
 rvi_trait_description_tt: "[recipient.GetTitledFirstName] possesses that which does not belong to [Select_CString(recipient.IsFemale, 'her', 'him')]"
 rvi_legacies.1003.t: "Butterfly"
 rvi_legacies.1003.desc.physique: "[vi_traitsuck.GetTitledFirstName] arrives at your command, just as ordered. You stand in the shadows, already feeling the surge of hunger; the anticipation that has been with you for years has sharpened into a barely controllable urge.\n\nBut as you step forward, your victim suddenly realizes the truth. [Select_CString(vi_traitsuck.IsFemale, 'She', 'He')] recoils in panic and bolts, desperately trying to reach the door. You move faster than [Select_CString(vi_traitsuck.IsFemale, 'she', 'he')] can comprehend. In an instant, your hand clamps onto the runaway's shoulder with an iron grip, wrenching [Select_CString(vi_traitsuck.IsFemale, 'her', 'him')] back around.\n\nThe door remains far behind.\n\n[Select_CString(vi_traitsuck.IsFemale, 'She', 'He')] struggles desperately, but beneath your fingers, you feel that very strength — powerful muscles, sturdy bones, and a restless life force. It is this exact strength that you shall now claim as your own"
 rvi_legacies.1003.desc.beauty: "[vi_traitsuck.GetTitledFirstName] arrives at your command, just as ordered. You stand in the shadows, already feeling the surge of hunger; the anticipation that has been with you for years has sharpened into a barely controllable urge.\n\nBut as you step forward, your victim suddenly realizes the truth. [Select_CString(vi_traitsuck.IsFemale, 'She', 'He')] recoils in panic and bolts, desperately trying to reach the door. You move faster than [Select_CString(vi_traitsuck.IsFemale, 'she', 'he')] can comprehend. In an instant, your hand clamps onto the runaway's shoulder with an iron grip, wrenching [Select_CString(vi_traitsuck.IsFemale, 'her', 'him')] back around.\n\nThe door remains far behind.\n\n[Select_CString(vi_traitsuck.IsFemale, 'She', 'He')] struggles desperately, but beneath your palms, you feel perfectly smooth skin, flawless features, and that rare charm that makes heads turn. It is this very beauty that you shall now claim"
 rvi_legacies.1003.desc.intellect: "[vi_traitsuck.GetTitledFirstName] arrives at your command, just as ordered. You stand in the shadows, already feeling the surge of hunger; the anticipation that has been with you for years has sharpened into a barely controllable urge.\n\nBut as you step forward, your victim suddenly realizes the truth. [Select_CString(vi_traitsuck.IsFemale, 'She', 'He')] recoils in panic and bolts, desperately trying to reach the door. You move faster than [Select_CString(vi_traitsuck.IsFemale, 'she', 'he')] can comprehend. In an instant, your hand clamps onto the runaway's shoulder with an iron grip, wrenching [Select_CString(vi_traitsuck.IsFemale, 'her', 'him')] back around.\n\nThe door remains far behind.\n\n[Select_CString(vi_traitsuck.IsFemale, 'She', 'He')] struggles desperately, but within [Select_CString(vi_traitsuck.IsFemale, 'her', 'him')] you sense a keen, vibrant mind — a clarity of thought and a spark of genius. And now, it belongs to you."
 rvi_legacies.1003.a: "I will take your strength"
 rvi_legacies.1003.b: "I will take your clarity of mind"
 rvi_legacies.1003.c: "I will take your beauty"
 rvi_legacies.1003.d: "Release [Select_CString(vi_traitsuck.IsFemale, 'her', 'him')]"
 rvi_give_trait_interaction: "Donate blood"
 rvi_give_trait_description_tt: "[recipient.GetTitledFirstName] shall receive my blood, and with it, my gift"
 rvi_legacies.1004.t: "Full Moon"
 rvi_legacies.1004.desc: "[vi_traitsucker1.GetTitledFirstName] freezes before you, not daring to lift [Select_CString(vi_traitsucker1.IsFemale, 'her', 'his')] eyes. A heavy silence hangs in the air, broken only by the soft rustle of your robes. You can feel your blood stirring at the proximity of one so much weaker than yourself.\n\nYou slowly close the distance. [Select_CString(vi_traitsucker1.IsFemale, 'She', 'He')] knows the price you are prepared to pay, and the power it will bring. \n\nYou bare your wrist, and in the silence of the room, the sound of torn flesh seems deafening. Dark, thick droplets begin to fall to the floor, but [vi_traitsucker1.GetTitledFirstName] does not notice; all of [Select_CString(vi_traitsucker1.IsFemale, 'her', 'his')] attention is transfixed by the fresh wound."
 rvi_legacies.1004.a: "Take my strength"
 rvi_legacies.1004.b: "Take my clarity of mind"
 rvi_legacies.1004.c: "Take my beauty"
 rvi_legacies.1004.d: "Dismiss [Select_CString(vi_traitsucker1.IsFemale, 'her', 'him')]"
 rvi_vampire_exalt_effect: "Allows the Dynasty Head to pass on their congenital traits to other vampires."
 rvi_createdham_interaction: "Prepare for the ritual"
 rvi_createdham_description_tt: "Reveal your true nature to the mortal, filling [Select_CString(recipient.IsFemale, 'her', 'his')] soul with bliss as you begin the preparation to consume [Select_CString(recipient.IsFemale, 'her', 'his')] congenital traits."
 rvi_dhampire_create_effect: "Allows you to begin preparations for transferring congenital traits from mortals to other vampires"
 rvi_dhampire_eat_effect: "Allows the Dynasty Head to harvest congenital traits (such as Beautiful, Herculean, or Genius) from mortal courtiers to either claim them for oneself or use them to improve existing ones"
 rvi_give_trait_effect: "Allows the Dynasty Head to transfer congenital traits (such as Beautiful, Herculean, and Genius) to other vampires"
 rvi_entracte_modifier: "Entr'acte"
 rvi_entracte_modifier_desc: "A mysterious figure visits this person by night, performing strange rituals. What will happen when these visitations cease?"
 rvi_ame_comblee_modifier: "Âme comblée"
 rvi_ame_comblee_modifier_desc: "This character's soul has been filled with an unnatural sense of fulfillment and bliss, as if touched by something beyond the mortal veil"
 rvi_ame_videe_modifier: "Âme vidée"
 rvi_ame_videe_modifier_desc: "A hollow shell is all that remains. The spark of life has been meticulously drawn out, leaving behind a cold void where a vibrant soul once resided."
 vi_unreformed_old_adj: "Old Vampirism"
 vi_eleusinian_old_adj: "Old Mysteries"
 vi_baphometi_old_adj: "Old cult of Horned God"
 vi_bloodreign_old_adj: "Old Reign of Blood"
 rvi_hungry_vampire_modifier: "The Hunger"
 rvi_hungry_vampire_modifier_desc: "Without regular sustenance, a bloodsucker can become extremely volatile and dangerous."
 rvi_victim_court_position: "Intimate Favorite"
 rvi_victim_court_position_desc: "Every day, this favorite fills a small vessel with their own blood, often without the slightest inkling of its true purpose."
 rvi_balance.0003.title: "The Hunger"
 rvi_balance.0003.desc: "Today the world looks different: colors have grown unnaturally vivid, and the rhythmic beating of mortal hearts beside me echoes like thunder in my ears.\n\nI feel a surging power; my entire body is so taut that I find it impossible to relax. Every second of self-control is a grueling battle with myself. My inner beast has not merely awakened—it claws beneath my ribs, sinking its talons into my mind and demanding its due."
 rvi_balance.0003.a1: "I will endure"
 rvi_balance.0003.a1_tt: "You will not be able to sate your hunger as long as the position of Intimate Favorite remains vacant"
 rvi_balance.0003.a2: "I must find someone. Immediately."
 rvi_balance.0003.a2_tt: "You will head out into the world to find anyone who might serve your needs."
 rvi_balance.0004.title: "A Meeting in the Deep Woods"
 rvi_balance.0004.desc: "To avoid tempting the beast, I was forced to shun the mortal settlement. After hours of wandering under the scorching sun, I retreated into the deep thicket, where the canopy shields my skin from the burning rays.\n\nYou were already prepared to pounce upon the first animal you could find, when suddenly, a filthy [Select_CString(new_victim.IsFemale, 'wench', 'rogue')] with a rusted sword leaped out from behind a tree.\n\n— Your money or your life, [Select_CString(ROOT.GetCharacter.IsFemale, 'good lady', 'kind sir' )]! - the cry rang out from beneath the forest canopy. \n\nIt might have sounded menacing, had it not been for the sharp note of desperation that crept into [new_victim.GetHerHis] voice the moment your eyes met.\nYou stopped, but instead of tearing [Select_CString(new_victim.IsFemale, 'this insolent wench', 'this insolent rogue' )] limb from limb, an idea struck you. You looked [Select_CString(new_victim.IsFemale, 'her', 'him' )] straight in the eyes frightened, pale, and clearly undernourished for many days.\n\nThe perfect candidate"
 rvi_balance.0004.a1: "I have a... curious proposal for you."
 rvi_balance.0004.a1_tt: "For a handsome reward, [Select_CString(new_victim.IsFemale, 'she', 'he')] will fill a small vessel with [new_victim.GetHerHis] blood each day to sate your hunger, truly believing that [Select_CString(new_victim.IsFemale, 'she', 'he')] is merely aiding a physician's research."
 rvi_balance.0004.a2: "Begone, before I tear your legs off!"
 rvi_balance.0004.a2_tt: "You will not be able to sate your hunger as long as the position of Intimate Favorite remains vacant"
 rvi_vampire_adopt_interaction: "Claim for the Pack"
 rvi_vampire_adopt_interaction_desc: "As an [Concept('vampire', 'darkspawn')|E], you can [adopt|E] a lowborn character into your [dynasty|E]. [recipient.GetTitledFirstNameNoTooltip] will become the head of the new house, but not your child or heir."
 RVI_AGES: "Aged and frail: $VALUE|=+0$"
 AI_YOUR_SOULMATE: "Your soulmate: $VALUE|=+0$"